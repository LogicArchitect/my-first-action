name: Daily Finance News

on:
  schedule:
    # UTC 23:00 = 北京时间 07:00
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests feedparser googletrans==4.0.0-rc1 yfinance

      - name: Run finance news script
        run: python finance_news.py

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 全球金融早报
          to: ${{ secrets.RECEIVER_EMAIL }}
          from: GitHub Actions
          body: file://report.html
          content_type: text/html
          convert_markdown: false
          ignore_errors: false
